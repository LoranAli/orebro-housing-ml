name: Daily Live Listings Update
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install selenium webdriver-manager
          
      - name: Verify file content
        run: |
          echo "=== Line 55-60 ==="
          sed -n '55,60p' scripts/daily_update.py
          echo "=== Grep selenium ==="
          grep -n "selenium" scripts/daily_update.py || echo "No selenium found"
          
      - name: Run daily update
        run: python scripts/daily_update.py 2>&1
        env:
          GITHUB_ACTIONS: "true"
      
      - name: Commit and push updated listings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/processed/active_listings_scored.csv
          git add -f data/history/
          if git diff --staged --quiet; then
            echo "Ingen ny data att committa"
          else
            git commit -m "Auto-update live listings $(date +%Y-%m-%d)"
            git push
          fi
