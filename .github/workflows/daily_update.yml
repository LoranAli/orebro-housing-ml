name: Daily Live Listings Update

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC = 08:00 svensk tid (CET vintertid)
  workflow_dispatch:       # Tillåt manuell körning från GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Debug
        run: |
          echo "=== Commit ==="
          git log --oneline -1
          echo "=== Rad 54-60 i daily_update.py ==="
          sed -n '54,60p' scripts/daily_update.py

      - name: Run daily update
        run: python scripts/daily_update.py 2>&1
        env:
          GITHUB_ACTIONS: "true"

      - name: Commit and push updated listings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/processed/active_listings_scored.csv
          if git diff --staged --quiet; then
            echo "Ingen ny data att committa"
          else
            git commit -m "Auto-update live listings $(date +%Y-%m-%d)"
            git push
          fi
